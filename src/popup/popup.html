<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>NOVSTATS</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">

    <div class="header">
      <div class="header-left">
        <img src="../../assets/logos/novstatslogo.png" class="logo-img" />
        <span class="logo">NOV<span class="accent">STATS</span></span>
      </div>
      <span class="version">v1.0</span>
    </div>

    <div class="section-label">Sources</div>
    <div class="rows">

      <div class="row">
        <span class="row-label">Leetify</span>
        <input type="checkbox" id="t-leetify" class="toggle-input" />
        <label for="t-leetify" class="toggle-label"></label>
      </div>

      <div class="row">
        <span class="row-label">CSStats</span>
        <input type="checkbox" id="t-csstats" class="toggle-input" />
        <label for="t-csstats" class="toggle-label"></label>
      </div>

      <div class="row">
        <span class="row-label">Faceit</span>
        <input type="checkbox" id="t-faceit" class="toggle-input" />
        <label for="t-faceit" class="toggle-label"></label>
      </div>

    </div>

    <div class="section-label">Display</div>
    <div class="rows">

      <div class="row">
        <div class="row-text">
          <span class="row-label">Compact</span>
          <span class="row-desc">KD, Aim, Winrate uniquement</span>
        </div>
        <input type="checkbox" id="t-compact" class="toggle-input" />
        <label for="t-compact" class="toggle-label"></label>
      </div>

    </div>

    <div class="footer">
      <a href="https://nvmb.lol" target="_blank" class="footer-link">nvmb.lol</a>
    </div>

  </div>
  <script src="../shared/storage.js"></script>
  <script src="popup.js"></script>
</body>
</html>
